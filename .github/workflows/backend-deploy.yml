name: Deliver Backend

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to production after delivering the image"
        required: true
        type: boolean
        default: false
      image_tag:
        description: "Existing ECR image tag to deploy. Leave empty to deploy this run's commit SHA."
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  PARAMETER_PATH: ${{ vars.PARAMETER_PATH }}

jobs:
  deliver:
    name: Build and publish image
    runs-on: ubuntu-latest

    outputs:
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Smoke test backend syntax
        working-directory: server
        run: node --check server.js

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f ./server/Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" ./server
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Record delivered image
        id: meta
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "Delivered image: $IMAGE_URI" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: deliver
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy }}
    environment: production

    env:
      ECR_REGISTRY: ${{ needs.deliver.outputs.ecr_registry }}
      IMAGE_TAG_TO_DEPLOY: ${{ inputs.image_tag || needs.deliver.outputs.image_tag }}
      TARGET_TAG_KEY: ${{ vars.EC2_TARGET_TAG_KEY }}
      TARGET_TAG_VALUE: ${{ vars.EC2_TARGET_TAG_VALUE }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy on EC2 using SSM
        run: |
          IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG_TO_DEPLOY"
          echo "Deploying image: $IMAGE"

          COMMAND_ID=$(
            aws ssm send-command \
              --region "$AWS_REGION" \
              --document-name "AWS-RunShellScript" \
              --targets "Key=tag:${TARGET_TAG_KEY},Values=${TARGET_TAG_VALUE}" \
              --comment "Deploy GreenCart API ${IMAGE_TAG_TO_DEPLOY}" \
              --parameters "commands=[
                \"set -euo pipefail\",
                \"if ! command -v docker >/dev/null 2>&1; then dnf install -y docker; fi\",
                \"systemctl enable --now docker\",
                \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
                \"docker pull $IMAGE\",
                \"docker rm -f greencart-api || true\",
                \"docker run -d --name greencart-api --restart unless-stopped -p 4000:4000 -e AWS_REGION=$AWS_REGION -e PARAMETER_PATH=$PARAMETER_PATH $IMAGE\",
                \"sleep 5\",
                \"docker ps --filter name=greencart-api --filter status=running --quiet | grep -q . || (docker logs --tail 100 greencart-api; exit 1)\",
                \"docker image prune -af --filter until=168h\"
              ]" \
              --query "Command.CommandId" \
              --output text
          )

          echo "SSM command id: $COMMAND_ID"

          STATUS=""
          for attempt in {1..36}; do
            STATUS=$(
              aws ssm list-command-invocations \
                --region "$AWS_REGION" \
                --command-id "$COMMAND_ID" \
                --details \
                --query "CommandInvocations[0].Status" \
                --output text
            )

            echo "SSM status: $STATUS"

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm list-command-invocations \
                  --region "$AWS_REGION" \
                  --command-id "$COMMAND_ID" \
                  --details
                exit 1
                ;;
            esac

            sleep 5
          done

          aws ssm list-command-invocations \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --details

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command did not finish successfully."
            exit 1
          fi
